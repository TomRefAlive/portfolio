<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature walk — Tomáš Mašek</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../style.css">
  <style>
    .project-header {
      padding: 150px 40px 48px;
      max-width: 900px;
    }

    .project-back {
      position: fixed;
      top: 90px;
      left: 40px;
      z-index: 200;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      border: 1px solid rgba(0,0,0,0.5);
      border-radius: 100px;
      background: #fff;
      color: #0a0a0a;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .project-back:hover { opacity: 0.85; }
    .project-back::before { content: '←'; font-size: 14px; }

    .project-header h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1;
      margin-bottom: 20px;
    }

    .project-meta {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .project-meta-item { display: flex; flex-direction: column; gap: 4px; }

    .project-meta-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .project-meta-value { font-size: 13px; color: var(--text); }

    .project-desc {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 560px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── PHOTO GRID ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin: 0 40px 80px;
    }

    .photo-cell {
      aspect-ratio: 1/1;
      overflow: hidden;
      background: var(--surface2);
      cursor: pointer;
      position: relative;
    }

    .photo-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.85);
      transition: transform 0.4s ease, filter 0.3s ease;
    }

    .photo-cell:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }

    .photo-placeholder-dark {
      width: 100%;
      height: 100%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--muted);
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .lightbox.active { opacity: 1; pointer-events: all; }

    .lightbox-img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
      user-select: none;
    }

    .lightbox-close {
      position: fixed;
      top: 24px; right: 28px;
      font-size: 28px;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      transition: color 0.2s;
      z-index: 1001;
    }

    .lightbox-close:hover { color: #fff; }

    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      cursor: pointer;
      padding: 14px 18px;
      transition: all 0.2s;
      z-index: 1001;
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .lightbox-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35);
    }

    @media (max-width: 700px) {
      .project-header { padding: 100px 20px 32px; }
      .project-grid { grid-template-columns: repeat(2, 1fr); margin: 0 0 60px; }
      .lightbox-prev { left: 8px; }
      .lightbox-next { right: 8px; }
    }

    @media (max-width: 400px) {
      .project-grid { grid-template-columns: 1fr; }
    }

    /* ── GRID CONTROLS ── */
    .grid-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 40px;
      margin-bottom: 16px;
    }

    .grid-controls-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }

    .grid-btn {
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 100px;
      background: transparent;
      color: var(--text);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.18s;
    }

    .grid-btn:hover { background: rgba(255,255,255,0.08); }
    .grid-btn.active { background: #fff; color: #0a0a0a; border-color: #fff; }

  </style>
</head>
<body>

  <nav>
    <a href="../../../index.html" class="nav-logo">Tomáš Mašek</a>
    <ul class="nav-links">
      <li><a href="../../../index.html#work">Work</a></li>
      <li><a href="../../../index.html#blog">Blog</a></li>
      <li><a href="../../../index.html#about">About me</a></li>
      <li><a href="../../../index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="project-header">
    <a href="../../../foto.html" class="project-back">Back to Photo</a>
    <h1>Waterfall in Kutná Hora</h1>
    <div class="project-meta">
      <div class="project-meta-item">
        <span class="project-meta-label">Date</span>
        <span class="project-meta-value">June 29, 2026</span>
      </div>
      <div class="project-meta-item">
        <span class="project-meta-label">Category</span>
        <span class="project-meta-value">Nature</span>
      </div>
      <div class="project-meta-item">
        <span class="project-meta-label">Photos</span>
        <span class="project-meta-value">1</span>
      </div>
    </div>
    <p class="project-desc">
      A quick shot of a waterfall in Kutná Hora.
    </p>
    <p>
      <a href="https://www.instagram.com/p/Da59sAuuFe-/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==" 
            class="desc-link">Instagram link</a>
    </p>
  </div>

  <!-- PHOTO GRID
       Jak přidat fotku: nahraď <div class="photo-placeholder-dark"> za <img src="../../images/nazev.jpg" alt="popis">
       Hero fotka zabírá 2 sloupce, ostatní jsou čtvercové. -->
  <div class="grid-controls">
    <span class="grid-controls-label">Grid</span>
    <button class="grid-btn active" data-cols="3" onclick="setGrid(this, 3)">3</button>
    <button class="grid-btn" data-cols="6" onclick="setGrid(this, 6)">6</button>
    <button class="grid-btn" data-cols="12" onclick="setGrid(this, 12)">12</button>
    <button class="grid-btn" data-cols="30" onclick="setGrid(this, 30)">30</button>
  </div>

  <div class="project-grid" id="lightbox-grid">

<div class="photo-cell" data-index="0">
  <img src="foto1.jpg" alt="Waterfall in Kutná Hora">
</div>

  </div>

  <footer>
    <span>© 2026 Tomáš Mašek</span>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">✕</button>
    <button class="lightbox-prev" id="lb-prev">←</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <button class="lightbox-next" id="lb-next">→</button>
    <div class="lightbox-counter" id="lb-counter"></div>
  </div>

  <script>
    const cells = Array.from(document.querySelectorAll('[data-index]'));
    const images = cells.map(c => c.querySelector('img')).filter(Boolean);
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    let current = 0;

    function openLightbox(index) {
      if (images.length === 0) return;
      current = index;
      lbImg.src = images[current].src;
      lbImg.alt = images[current].alt;
      lbCounter.textContent = (current + 1) + ' / ' + images.length;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('active');
      document.body.style.overflow = '';
    }

    function showNext() {
      current = (current + 1) % images.length;
      lbImg.src = images[current].src;
      lbImg.alt = images[current].alt;
      lbCounter.textContent = (current + 1) + ' / ' + images.length;
    }

    function showPrev() {
      current = (current - 1 + images.length) % images.length;
      lbImg.src = images[current].src;
      lbImg.alt = images[current].alt;
      lbCounter.textContent = (current + 1) + ' / ' + images.length;
    }

    cells.forEach(cell => {
      const img = cell.querySelector('img');
      if (!img) return;
      cell.addEventListener('click', () => openLightbox(images.indexOf(img)));
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-next').addEventListener('click', showNext);
    document.getElementById('lb-prev').addEventListener('click', showPrev);
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('active')) return;
      if (e.key === 'ArrowRight') showNext();
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'Escape') closeLightbox();
    });

    function setGrid(btn, cols) {
      const grid = document.getElementById('lightbox-grid');
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
