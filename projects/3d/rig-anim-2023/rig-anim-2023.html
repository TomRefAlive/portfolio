<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rig Anim Project — Tomáš Mašek</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../style.css">
  <style>
    .project-header {
      padding: 150px 40px 48px;
      max-width: 900px;
    }

    .project-back {
      position: fixed;
      top: 90px;
      left: 40px;
      z-index: 200;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      border: 1px solid rgba(0,0,0,0.5);
      border-radius: 100px;
      background: #fff;
      color: #0a0a0a;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .project-back:hover { opacity: 0.85; }
    .project-back::before { content: '←'; font-size: 14px; }
    
    .project-header h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1;
      margin-bottom: 20px;
    }

    .project-meta {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .project-meta-item { display: flex; flex-direction: column; gap: 4px; }

    .project-meta-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .project-meta-value { font-size: 13px; color: var(--text); }

    .project-desc {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 560px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── VIDEO EMBED ── */
    .video-wrap {
      margin: 0 40px 80px;
      position: relative;
      aspect-ratio: 16/9;
      max-width: 900px;
      background: #000;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 700px) {
      .project-header { padding: 100px 20px 32px; }
      .video-wrap { margin: 0 0 60px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../../../index.html" class="nav-logo">Tomáš Mašek</a>
    <ul class="nav-links">
      <li><a href="../../../index.html#work">Work</a></li>
      <li><a href="../../../index.html#about">About me</a></li>
      <li><a href="../../../index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="project-header">
    <a href="../../../3d.html" class="project-back">Back to 3D</a>
    <h1>Rig Anim Project</h1>
    <div class="project-meta">
      <div class="project-meta-item">
        <span class="project-meta-label">Date</span>
        <span class="project-meta-value">Jan 2, 2023</span>
      </div>
      <div class="project-meta-item">
        <span class="project-meta-label">Category</span>
        <span class="project-meta-value">3D / Motion</span>
      </div>
      <div class="project-meta-item">
        <span class="project-meta-label">Software</span>
        <span class="project-meta-value">Blender</span>
      </div>
    </div>
    <p class="project-desc">
      A character rigging and animation study created in Blender.
    </p>
  </div>

  <!-- VIDEO EMBED -->
  <div class="video-wrap">
    <iframe
      src="https://www.youtube.com/embed/wJziWhY0gls?rel=0&modestbranding=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <footer>
    <span>© 2026 Tomáš Mašek</span>
  </footer>

</body>
</html>
