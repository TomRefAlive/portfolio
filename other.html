<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Other work — Tomáš Mašek</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── TITLES-STYLE ROW LIST (matches video.html Titles view) ── */
    .other-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--border);
      border: 1px solid var(--border);
      margin: 0 40px 80px;
    }

    .other-row {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      align-items: center;
      text-decoration: none;
      color: var(--text);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      min-height: 64px;
      transition: background 0.2s;
    }

    .other-row:last-child { border-bottom: none; }
    .other-row:hover { background: var(--surface2); }

    .other-row-thumb {
      width: 96px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      font-size: 24px;
    }

    .other-row-body {
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .other-row-title {
      font-family: 'Anton', sans-serif;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .other-row-date {
      padding: 0 24px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      .other-list { margin: 0 0 60px; }
      .other-row { grid-template-columns: 72px 1fr auto; }
      .other-row-thumb { width: 72px; height: 48px; font-size: 20px; }
      .other-row-body { padding: 0 12px; }
      .other-row-date { padding: 0 12px; font-size: 11px; }
    }
  </style>
</head>
<body>

      <div class="other-row-thumb">🌡️</div>
      <div class="other-row-body">

  <footer>
